name: Deploy Frontend

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy frontend to server
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          sshpass -e ssh -p 44544 -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            set -e
            git config --global --add safe.directory /pool/www/nextudy.alakbaroff.com/frontend
            git -C /pool/www/nextudy.alakbaroff.com/frontend pull origin master
            docker compose -f /pool/www/nextudy.alakbaroff.com/docker-compose.yml up -d --no-deps --build nextudy-frontend
          EOF
